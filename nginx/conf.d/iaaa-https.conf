# IAAA · Nginx · HTTPS — Step 2 of staging deploy
#
# Activate after certbot has obtained the certificate:
#   sudo certbot certonly --webroot -w ./nginx/certbot/www -d staging.iaaa.app
#
# Then:
#   cp nginx/conf.d/iaaa-https.conf nginx/conf.d/iaaa.conf
#   docker compose exec nginx nginx -s reload
#
# Cert path assumes certbot wrote to /etc/letsencrypt (mounted as volume).

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name staging.iaaa.app www.staging.iaaa.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name staging.iaaa.app www.staging.iaaa.app;

    ssl_certificate     /etc/letsencrypt/live/staging.iaaa.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.iaaa.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── API → FastAPI backend ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;   # "https" — required for Secure cookies
        proxy_read_timeout 35s;
    }

    # ── Everything else → Next.js frontend ────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
