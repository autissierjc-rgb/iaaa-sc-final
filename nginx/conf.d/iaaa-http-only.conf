# IAAA · Nginx · HTTP-only — Step 1 of staging deploy
#
# Use this config for:
#   1. First boot — verify reverse proxy works before SSL
#   2. Let's Encrypt ACME challenge (certbot --webroot)
#
# After certbot succeeds, switch to iaaa.conf (HTTPS version).
#
# To activate:
#   cp nginx/conf.d/iaaa-http-only.conf nginx/conf.d/iaaa.conf
#   docker compose exec nginx nginx -s reload

server {
    listen 80;
    server_name staging.iaaa.app www.staging.iaaa.app;

    # Let's Encrypt ACME challenge — must be reachable before requesting cert
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── API → FastAPI backend ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
    }

    # ── Everything else → Next.js frontend ────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
