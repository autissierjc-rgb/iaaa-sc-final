# IAAA · V1 · Nginx reverse proxy
# SSL termination via Let's Encrypt / Certbot
# Bloc 0: HTTP only for local dev. HTTPS configured at deploy time.

server {
    listen 80;
    server_name localhost iaaa.app www.iaaa.app;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP → HTTPS in production
    # Uncomment after certbot setup:
    # return 301 https://$host$request_uri;

    # ── API → FastAPI backend ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 65s;   # 60s pipeline (25s search + 45s generate) + 5s buffer
    }

    # ── Everything else → Next.js frontend ────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
